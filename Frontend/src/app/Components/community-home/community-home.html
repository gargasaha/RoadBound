<div class="d-flex flex-column min-vh-100">
    <div #chatContainer class="flex-grow-1 overflow-y-auto p-3" style="height: calc(100vh - 170px);">
        @for(msg of messages(); track $index){

        <div [ngClass]="msg.riderId._id === this.riderId() ? 'd-flex justify-content-end' : 'd-flex justify-content-start'"
            class="mb-3">

            <div [ngClass]="msg.riderId._id === this.riderId() ? 'bg-primary text-white' : 'bg-warning text-dark'"
                class="p-3 rounded-4" style="max-width: 50vw; word-wrap: break-word;">
                <p class="mb-1 fw-semibold small text-capitalize">{{ msg.riderId.riderName }}</p>

                <p class="mb-0">{{ msg.message }}</p>

            </div>
        </div>
        }
    </div>
    @if(attachmentState() && attachmentType() === 'image'){
    <div class="attachment-preview shadow">
        <button type="button" class="btn-close preview-close" (click)="removeAttachment()"
            aria-label="Remove attachment" title="Remove attachment">
            ×
        </button>

        <img [src]="attachmentData()" class="img-fluid rounded">
        <button type="button"
            class="btn w-100 mt-3 rounded-pill fw-semibold shadow-sm py-2 border-0 text-dark"
            style="background: linear-gradient(90deg, #ffd84d 0%, #ff9f1c 100%);">
            Send
        </button>
    </div>
    }
    <section class="border-top bg-white p-3 mt-auto position-sticky bottom-0">
        <div class="container">
            <div class="d-flex gap-2 align-items-center">
                <input type="text" class="form-control rounded-pill px-3 py-2" placeholder="Type a message..."
                    [(ngModel)]="message" />
                <label
                    class="btn btn-light rounded-pill px-3 py-2 mb-0 d-flex align-items-center justify-content-center"
                    style="cursor: pointer;" title="Attach file">
                    <span class="fs-5">📎</span>
                    <input type="file" class="d-none" (change)="addAttachment($event)">
                </label>
                <button type="button" class="btn btn-lg rounded-pill px-4 fw-semibold shadow border-0 text-dark"
                    style="background: linear-gradient(90deg, #ffd84d 0%, #ff9f1c 100%);" (click)="sendMessage()">
                    Send
                </button>
            </div>
            <div class="d-flex gap-2 mt-3 justify-content-end">
                <button class="btn btn-lg rounded-pill px-5 fw-semibold shadow border-0 text-dark"
                    style="background: linear-gradient(90deg, #ffd84d 0%, #ff9f1c 100%);">
                    Start ride
                </button>
            </div>
        </div>
    </section>
</div>
<style>
    .chat-container {
        height: calc(100vh - 170px);
        overflow-y: auto;
    }

    .attachment-preview {
    position: fixed;
    bottom: 90px;              /* Above the message input */
    left: 50%;
    transform: translateX(-50%);
    width: 280px;
    max-width: 90vw;

    background: #fff;
    border-radius: 16px;
    padding: 12px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    border: 1px solid #e5e5e5;
    z-index: 1050;
}

.attachment-preview img {
    width: 100%;
    max-height: 260px;
    object-fit: contain;
    border-radius: 12px;
}

.preview-close {
    position: absolute;
    top: -10px;
    right: -10px;

    width: 30px;
    height: 30px;

    border-radius: 50%;
    background: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
    opacity: 1;
}

.preview-close:hover {
    background: #f1f1f1;
}
</style>
