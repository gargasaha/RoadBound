<nav class="navbar navbar-expand-lg bg-warning fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand d-flex align-items-center" href="#">
      @if(this.communityImage()=='' && this.communityName()==''){
        <img src="/images/logo.png" style="border-radius: 25px;" alt="RoadBound logo" width="32" height="32" class="me-2" />
        <span>RoadBound</span>
      }
      @else{
        <img [src]='this.communityImage()' style="border-radius: 25px; width: 32px; height: 32px; object-fit: cover;" alt="RoadBound logo" width="32" height="32" class="me-2" />
        <span>{{this.communityName()}}</span>
      }
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="/">Home</a>
        </li>
        <li class="nav-item">
          @if(this.isLoggedIn()==false){
            <a class="nav-link" href="/login">Log in</a>
          }
          @else{
            <button class="nav-link" (click)="logout()">Log out</button>
          }
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/register">Register</a>
        </li>
        <li class="nav-item">
          @if(this.isLoggedIn()==true){
            <a class="nav-link" href="/profile">Profile</a>
          }
        </li>
      </ul>
    </div>
